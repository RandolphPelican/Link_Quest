cat > ~/Link_Quest/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div id="loading-content">
      <h1 id="game-title">⚔️ LINK QUEST</h1>
      <p id="loading-sub">A Family Built RPG</p>
      <div id="loading-bar-wrap">
        <div id="loading-bar"></div>
      </div>
      <p id="loading-tip">Loading assets...</p>
    </div>
  </div>

  <!-- CHARACTER SELECT -->
  <div id="char-select-screen" class="hidden">
    <h2>Choose Your Character</h2>
    <div id="char-grid">
      <div class="char-card" data-char="lincoln">
        <div class="char-avatar" style="background:#3498db"></div>
        <p class="char-name">Lincoln</p>
        <p class="char-desc">Sword | Balanced</p>
      </div>
      <div class="char-card" data-char="journey">
        <div class="char-avatar" style="background:#9b59b6"></div>
        <p class="char-name">Journey</p>
        <p class="char-desc">Staff | Mage</p>
      </div>
      <div class="char-card" data-char="bear">
        <div class="char-avatar" style="background:#27ae60"></div>
        <p class="char-name">Bear</p>
        <p class="char-desc">Bow | Ranged</p>
      </div>
      <div class="char-card" data-char="dad">
        <div class="char-avatar" style="background:#e67e22"></div>
        <p class="char-name">Dad</p>
        <p class="char-desc">Club | Tank</p>
      </div>
    </div>
    <button id="start-btn" disabled>Select a Character</button>
  </div>

  <!-- PHASER CANVAS MOUNTS HERE — full window, no overlap -->
  <div id="game-container" class="hidden"></div>

  <!-- GAME OVER -->
  <div id="gameover-screen" class="hidden">
    <h2>💀 GAME OVER</h2>
    <p id="gameover-score">Score: 0</p>
    <button id="retry-btn">Try Again</button>
  </div>

  <!-- CUTSCENE -->
  <div id="cutscene-overlay" class="hidden">
    <div id="cutscene-box">
      <p id="cutscene-text"></p>
      <button id="cutscene-next">▶ Next</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="js/item.js"></script>
  <script src="js/room.js"></script>
  <script src="js/player.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/boss.js"></script>
  <script src="js/network.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
EOF
#..
